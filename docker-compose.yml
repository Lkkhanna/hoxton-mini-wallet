version: '3.8'

services:
  # ─── MySQL Database ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: wallet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wallet_db
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Laravel Backend API ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wallet-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/database:/var/www/html/database
      - ./backend/config/cors.php:/var/www/html/config/cors.php
      - ./backend/tests:/var/www/html/tests
    environment:
      APP_NAME: "Mini Wallet"
      APP_ENV: local
      APP_KEY: base64:RaNdOmKeYgEnErAtEdHeRe1234567890=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: wallet_db
      DB_USERNAME: wallet_user
      DB_PASSWORD: wallet_pass
    depends_on:
      db:
        condition: service_healthy

  # ─── Vue 2 Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wallet-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VUE_APP_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  db_data:
